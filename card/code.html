</div>

<circle class="text-tertiary" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-width="4"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">

</div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">Poin Siswa</span>
